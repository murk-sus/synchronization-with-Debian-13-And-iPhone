# Debian Full Sync configuration
# Debian PC hostname or IP (required)
REMOTE_HOST="192.168.1.10"

# SSH user on Debian side
REMOTE_USER="your_debian_user"
REMOTE_PORT="22"

# Local iPhone folder to sync
LOCAL_SHARE_DIR="/var/mobile/Media/DebianSync/shared"

# Debian folder to sync with
REMOTE_SHARE_DIR="/home/your_debian_user/iPhoneSync/shared"

# Clipboard backend on Debian (X11/Wayland fallback)
REMOTE_CLIP_CMD_GET="xclip -selection clipboard -o 2>/dev/null || wl-paste 2>/dev/null || true"
REMOTE_CLIP_CMD_SET="xclip -selection clipboard -i 2>/dev/null || wl-copy 2>/dev/null || true"
